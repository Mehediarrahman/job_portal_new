{% extends 'base/base.html' %}
{% block body %}


<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Title</th>
      <th scope="col">Category</th>
      <th scope="col">Status</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    
    {% for i in Apply %}
        
   
        
    <tr>
      <th scope="row">{{forloop.counter}}</th>
      <td>{{i.job.title}}</td>
      <td>{{i.job.category}}</td>
      <td>{{i.status}}</td>
        
        {% if request.user.user_type == "Recruiter" %}
            
       
            
      <td>
        <a class="btn btn-warning" href="{% url 'shortListPage' i.id  %}">Short List</a>
        <a class="btn btn-danger" href="{% url 'rejectPage' i.id  %}">Reject</a>
      </td>
 {% endif %}
    </tr>
 {% endfor %}
  </tbody>
</table>

{% endblock body %}
