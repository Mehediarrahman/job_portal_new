{% extends 'base/base.html' %}
{% block content %}
<h2>My Applications</h2>
{% if myApplications %}
    <table>
        <tr>
            <th>Job Title</th>
            <th>Status</th>
        </tr>
        {% for app in myApplications %}
        <tr>
            <td>{{ app.job.title }}</td>
            <td>{{ app.status }}</td>
        </tr>
        {% endfor %}
    </table>
{% else %}
    <p>You haven't applied to any jobs yet.</p>
{% endif %}
{% endblock %}
